<main>
    <h1>Fale Conosco</h1>
    <fieldset>
        <legend>Preencha os campos abaixo</legend>
        <form action="resposta2.html" method="get"
            target="_blank" enctype="application/x-www-form-urlencoded" autocomplete="on">
            <label for="nome">* Nome: </label>
            <input type="text" id="nome" name="nome" required pattern="[a-zA-Z ]+"
                placeholder="Nome completo" maxlength="100"/><br><br>
            <label for="email">* E-mail: </label>
            <input type="email" id="email" name="email" placeholder="E-mail" required/><br><br>
            <label for="tel">Telefone: </label>
            <input type="tel" id="tel" name="tel" placeholder="(84) 99999-9999" maxlength="11" pattern="[0-9]+"/><br><br>
            <label for="assunto">Assunto: </label>
            <select name="assunto" id="assunto">
                <option value=""></option>
                <option value="Agendar passeio">Agendar passeio</option>
                <option value="Orçamento">Orçamento</option>
                <option value="Outros">Outros</option>
            </select><br><br>
            <label for="mensagem">Mensagem:</label><br>
            <textarea name="mensagem" id="mensagem" rows="5" cols="30"></textarea><br><br>
            <input type="submit" value="Enviar"/>
        </form>
    </fieldset>
</main>
